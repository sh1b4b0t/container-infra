model_list:
  # LMStudio (local) - OpenAI compatible
  - model_name: lmstudio
    litellm_params:
      model: openai/
      api_base: http://192.168.15.100:11434/v1
      api_key: lmstudio

  # Alibaba DashScope models (Anthropic-compatible endpoint)
  - model_name: qwen3.5-plus
    litellm_params:
      model: anthropic/qwen3.5-plus
      api_base: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
      api_key: os.environ/ALIBABA_API_KEY

  - model_name: glm-5
    litellm_params:
      model: anthropic/glm-5
      api_base: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
      api_key: os.environ/ALIBABA_API_KEY

  - model_name: minimax-m2.5
    litellm_params:
      model: anthropic/MiniMax-M2.5
      api_base: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
      api_key: os.environ/ALIBABA_API_KEY

  - model_name: kimi-k2.5
    litellm_params:
      model: anthropic/kimi-k2.5
      api_base: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
      api_key: os.environ/ALIBABA_API_KEY

litellm_settings:
  drop_params: True 
  set_verbose: True
  cache: True
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ttl: 3600  # Cache por 1 hora
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL